{% extends "base.html" %}
{% block title %}PG-Probe - 慢查询{% endblock %}

{% block content %}
<div class="filter-bar">
    <div class="filter-group">
        <label>数据库:</label>
        <select id="db-select"></select>
    </div>
    <div class="filter-group">
        <label>时间窗口:</label>
        <div class="window-btns">
            <button class="window-btn active" data-window="1h">1小时</button>
            <button class="window-btn" data-window="12h">12小时</button>
            <button class="window-btn" data-window="24h">24小时</button>
        </div>
    </div>
    <div class="filter-group">
        <label>最小执行时间(秒):</label>
        <input type="number" id="min-duration" value="0" min="0" step="0.5">
    </div>
    <div class="filter-group">
        <label>搜索:</label>
        <input type="text" id="search-input" placeholder="查询关键词...">
    </div>
    <button class="btn-refresh" id="btn-refresh">刷新</button>
</div>

<div class="query-count" id="query-count">共 0 条记录</div>

<div class="slow-query-table-wrap">
    <table class="slow-query-table" id="slow-query-table">
        <thead>
            <tr>
                <th class="col-query">查询文本</th>
                <th class="col-duration">执行时间</th>
                <th class="col-user">用户</th>
                <th class="col-time">触发时间</th>
                <th class="col-wait">等待事件</th>
            </tr>
        </thead>
        <tbody id="query-tbody">
        </tbody>
    </table>
</div>

<div class="query-detail-modal" id="query-modal" style="display:none;">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h3>查询详情</h3>
            <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <pre id="modal-query-text"></pre>
            <div class="modal-meta" id="modal-meta"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/slow_queries.js"></script>
{% endblock %}
